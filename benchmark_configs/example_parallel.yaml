# ============================================================================
# Parallel Training Benchmark Example
# ============================================================================
# Trains DQN on 3 buildings in parallel (same episodes, separate control)
# One agent sees observations from all buildings simultaneously
# ============================================================================

benchmark:
  name: "DQN_Parallel_3Buildings"
  description: "Parallel DQN training on 3 buildings with simultaneous observations"
  author: "Akrem Dabbech"
  tags: ["dqn", "parallel", "multibuilding"]
  
  # Global settings
  seed: 42
  output_dir: "experiments/parallel_dqn"
  use_gpu: true
  
  # Dataset
  dataset:
    type: "original"
    name: "citylearn_challenge_2022_phase_all"
    simulation_days: 30
    
  # Environment (decentralized mode)
  environment:
    type: "citylearn"
    central_agent: false
    
  # Tariff
  tariff:
    type: "hp_hc"
    price_hp: 0.22
    price_hc: 0.14
    hc_hours: [23, 0, 1, 2, 3, 4, 5, 6]
    
  # Agent
  agents:
    - name: "dqn"
      enabled: true
      config:
        action_bins: 31
        buffer_size: 500000  # Larger buffer for parallel training
        batch_size: 256      # Larger batch for more data
        learning_rate: 0.0003
        gamma: 0.99
        epsilon_start: 1.0
        epsilon_end: 0.01
        epsilon_decay: 0.995
        
  # Training (Parallel Mode)
  training:
    mode: "parallel"
    episodes: 200  # Total episodes (not per building)
    buildings:
      selection: "manual"
      ids: ["Building_1", "Building_2", "Building_3"]
    save_frequency: 50
    save_best: true
    save_final: true
    early_stopping:
      enabled: true
      patience: 50
      min_delta: 0.01
      
  # Validation
  validation:
    enabled: true
    episodes: 20
    frequency: 50
    buildings:
      selection: "manual"
      ids: ["Building_4", "Building_5"]
      
  # Testing
  testing:
    enabled: true
    mode: "normal"
    episodes: 50
    buildings:
      selection: "manual"
      ids: ["Building_6", "Building_7"]
      
  # Reward
  reward:
    name: "custom_v5"
    config:
      alpha_import_hp: 0.6
      alpha_peak: 0.01
      alpha_pv_base: 0.10
      alpha_pv_soc: 0.35
      alpha_soc: 0.05
      soc_lo: 0.30
      soc_hi: 0.60
      
  # Analysis
  analysis:
    perform_eda: false
    save_plots: true
    generate_report: true
    
  # Advanced
  advanced:
    parallel:
      num_workers: 3  # One per building
    active_observations:
      - "hour"
      - "electricity_pricing"
      - "net_electricity_consumption"
      - "electrical_storage_soc"
      - "solar_generation"